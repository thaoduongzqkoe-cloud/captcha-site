<style>
*{
  box-sizing:border-box;
}

html, body {
  height:100%;
  margin:0;
  padding:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

.wrapper{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

.captcha-box {
  border:1px solid #dcdcdc;
  background:#fff;
  padding:14px;
  border-radius:8px;
  width:100%;
  max-width:300px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.captcha-row {
  display:flex;
  align-items:center;
  cursor:pointer;
}

.checkbox {
  width:22px;
  height:22px;
  border:2px solid #555;
  margin-right:10px;
  position:relative;
  flex-shrink:0;
}

.spinner {
  width:18px;
  height:18px;
  border:3px solid #ccc;
  border-top:3px solid #4285F4;
  border-radius:50%;
  animation:spin 1s linear infinite;
  position:absolute;
  top:1px;
  left:1px;
  display:none;
}

.checkmark {
  display:none;
  color:white;
  background:#34A853;
  width:100%;
  height:100%;
  text-align:center;
  line-height:22px;
  font-size:14px;
  font-weight:bold;
}

.logo {
  font-size:11px;
  color:#777;
  margin-top:8px;
  text-align:right;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* ===== Countdown Overlay ===== */
#countdownOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s ease;
}

#countdownNumber{
  font-size:80px;
  color:#fff;
  font-weight:bold;
  transform:scale(0.5);
  opacity:0;
  animation:pop 1s ease forwards;
}

@keyframes pop{
  0%{ transform:scale(0.5); opacity:0; }
  50%{ transform:scale(1.2); opacity:1; }
  100%{ transform:scale(1); opacity:1; }
}
</style>

</head>

<body>

<div class="wrapper">
  <div class="captcha-box">
    <div class="captcha-row" onclick="verify()">
      <div class="checkbox">
        <div class="spinner" id="spinner"></div>
        <div class="checkmark" id="check">✔</div>
      </div>
      <span style="font-size:14px;">I’m not a robot</span>
    </div>
    <div class="logo">reCAPTCHA<br><small>Privacy - Terms</small></div>
  </div>
</div>

<!-- Countdown UI -->
<div id="countdownOverlay">
  <div id="countdownNumber">3</div>
</div>

<script>
let done = false;

function verify(){
  if(done) return;

  let spinner = document.getElementById("spinner");
  let check = document.getElementById("check");

  spinner.style.display = "block";

  setTimeout(()=>{
    spinner.style.display = "none";
    check.style.display = "block";
    done = true;

    ttq.track('CompleteRegistration');

    // gọi countdown thay vì redirect ngay
    startCountdown();

  }, 1500);
}

/* ===== Countdown logic ===== */
function startCountdown(){
  const overlay = document.getElementById("countdownOverlay");
  const number = document.getElementById("countdownNumber");

  overlay.style.opacity = "1";
  overlay.style.pointerEvents = "auto";

  let count = 3;
  number.innerText = count;

  let interval = setInterval(()=>{
    count--;

    if(count === 0){
      clearInterval(interval);

      number.innerText = "GO!";
      number.style.animation = "pop 0.5s ease";

      setTimeout(()=>{
        window.location.href = "https://nnm.98759.cc/?inviteCode=72861236&tiktokId=D76RVURC77UF4O9TH4QG";
      }, 500);

    } else {
      number.style.animation = "none";
      void number.offsetWidth;
      number.style.animation = "pop 1s ease";
      number.innerText = count;
    }

  }, 1000);
}
</script>

</body>
</html>
